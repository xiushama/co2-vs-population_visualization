<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CO2 vs Population</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px 16px 28px;
        font-family: "Open Sans", system-ui, sans-serif;
        color: #1f2937;
        min-height: 100vh;
        background: linear-gradient(180deg, #fafafa 0%, #f3f4f6 100%);
      }

      .report-button {
        position: absolute;
        top: 95px;
        left: 40px;

        width: 90px;
        height: 90px;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        background: #7c3aed;
        color: white;

        font-size: 14px;
        font-weight: 600;
        text-align: center;

        border-radius: 12px;
        text-decoration: none;

        box-shadow: 0 6px 16px rgba(124, 58, 237, 0.3);
        transition: all 0.2s ease;
      }

      .report-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 22px rgba(124, 58, 237, 0.4);
      }

      .page-title {
        text-align: center;
        font-weight: 600;
        font-size: clamp(1.25rem, 3.5vw, 1.85rem);
        margin: 0 0 1rem;
        letter-spacing: -0.02em;
        line-height: 1.25;
        background: linear-gradient(
          120deg,
          #4f46e5 0%,
          #7c3aed 45%,
          #c026d3 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 2px 3px rgba(124, 58, 237, 0.25))
          drop-shadow(0 4px 12px rgba(79, 70, 229, 0.15));
      }

      .chart-wrap {
        width: 100%;
        max-width: min(1080px, calc(100vw - 32px));
        margin: 0 auto;
      }

      .svg-viewport {
        width: 100%;
        aspect-ratio: 1080 / 500;
        max-height: min(calc(100vh - 200px), 440px);
        border-radius: 12px;
        background: #fff;
        box-shadow:
          0 4px 24px rgba(15, 23, 42, 0.08),
          0 0 0 1px rgba(15, 23, 42, 0.06);
        overflow: hidden;
      }

      #chart {
        display: block;
        width: 100%;
        height: 100%;
        font-family: "Open Sans", system-ui, sans-serif;
      }

      .slider-block {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0 4px;
      }

      .year-slider {
        display: block;
        width: 100%;
        height: 12px;
        margin: 0 auto;
        -webkit-appearance: none;
        appearance: none;
        cursor: pointer;
        border-radius: 6px;
        background: transparent;
      }

      .year-slider::-webkit-slider-runnable-track {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          #ede9fe 0%,
          #c4b5fd 35%,
          #a78bfa 70%,
          #8b5cf6 100%
        );
        box-shadow:
          inset 0 1px 3px rgba(255, 255, 255, 0.6),
          0 1px 2px rgba(91, 33, 182, 0.12);
      }

      .year-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        margin-top: -4px;
        border-radius: 4px;
        background: linear-gradient(145deg, #7c3aed, #5b21b6);
        border: 2px solid #fff;
        box-shadow:
          0 2px 8px rgba(91, 33, 182, 0.45),
          0 0 0 1px rgba(124, 58, 237, 0.35);
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease;
      }

      .year-slider::-webkit-slider-thumb:hover {
        transform: scale(1.06);
        box-shadow: 0 3px 12px rgba(91, 33, 182, 0.55);
      }

      .year-slider::-webkit-slider-thumb:active {
        transform: scale(0.98);
      }

      .year-slider::-moz-range-track {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          #ede9fe 0%,
          #c4b5fd 35%,
          #a78bfa 70%,
          #8b5cf6 100%
        );
        box-shadow:
          inset 0 1px 3px rgba(255, 255, 255, 0.6),
          0 1px 2px rgba(91, 33, 182, 0.12);
      }

      .year-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        background: linear-gradient(145deg, #7c3aed, #5b21b6);
        border: 2px solid #fff;
        box-shadow:
          0 2px 8px rgba(91, 33, 182, 0.45),
          0 0 0 1px rgba(124, 58, 237, 0.35);
      }

      .year-label-row {
        text-align: center;
        margin-top: 0.65rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #4b5563;
        letter-spacing: 0.02em;
      }

      #yearLabel {
        color: #5b21b6;
        font-variant-numeric: tabular-nums;
      }

      .view-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.75rem 1.25rem;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #4b5563;
      }

      .view-controls-group {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.65rem 0.85rem;
      }

      .view-controls-divider {
        width: 1px;
        height: 1.5rem;
        background: linear-gradient(
          180deg,
          transparent,
          #d1d5db 20%,
          #d1d5db 80%,
          transparent
        );
        flex-shrink: 0;
      }

      @media (max-width: 640px) {
        .view-controls-divider {
          display: none;
        }
      }

      .view-controls-label {
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .view-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        user-select: none;
      }

      .view-toggle span {
        font-weight: 600;
        font-size: 0.88rem;
        color: #6b7280;
        transition: color 0.15s ease;
      }

      .view-toggle span.active {
        color: #5b21b6;
      }

      .switch {
        position: relative;
        width: 48px;
        height: 26px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .switch-track {
        position: absolute;
        inset: 0;
        cursor: pointer;
        border-radius: 999px;
        background: linear-gradient(90deg, #ede9fe 0%, #ddd6fe 100%);
        box-shadow:
          inset 0 1px 3px rgba(255, 255, 255, 0.7),
          0 1px 2px rgba(91, 33, 182, 0.08);
        transition: background 0.2s ease;
      }

      .switch input:focus-visible + .switch-track {
        outline: 2px solid #8b5cf6;
        outline-offset: 2px;
      }

      .switch input:checked + .switch-track {
        background: linear-gradient(90deg, #c4b5fd 0%, #a78bfa 100%);
      }

      .switch-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(145deg, #fff 0%, #f3f0ff 100%);
        border: 2px solid #7c3aed;
        box-shadow: 0 2px 6px rgba(91, 33, 182, 0.25);
        transition: transform 0.2s ease;
      }

      .switch input:checked + .switch-track .switch-thumb {
        transform: translateX(22px);
      }

      .filter-panel-wrap {
        margin-top: 1.35rem;
        width: 100%;
        padding: 0 4px;
      }

      .filter-dropdown-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 100%;
        padding: 0.55rem 0.85rem;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        color: #4b5563;
        background: #fff;
        border: 1px solid rgba(124, 58, 237, 0.35);
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(91, 33, 182, 0.08);
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .filter-dropdown-btn:hover {
        border-color: rgba(124, 58, 237, 0.55);
        box-shadow: 0 3px 12px rgba(91, 33, 182, 0.12);
      }

      .filter-dropdown-btn:focus-visible {
        outline: 2px solid #8b5cf6;
        outline-offset: 2px;
      }

      .filter-dropdown-btn .filter-chevron {
        color: #7c3aed;
        font-size: 0.75rem;
        transition: transform 0.2s ease;
      }

      .filter-dropdown-btn[aria-expanded="true"] .filter-chevron {
        transform: rotate(180deg);
      }

      .filter-panel {
        margin-top: 0.5rem;
        padding: 0.75rem 0.85rem 0.85rem;
        background: #fff;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(15, 23, 42, 0.07);
      }

      .filter-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.65rem;
        padding-bottom: 0.65rem;
        border-bottom: 1px solid #e5e7eb;
      }

      .filter-actions button {
        padding: 0.35rem 0.75rem;
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 600;
        color: #5b21b6;
        background: #f5f3ff;
        border: 1px solid #ddd6fe;
        border-radius: 6px;
        cursor: pointer;
        transition:
          background 0.12s ease,
          border-color 0.12s ease;
      }

      .filter-actions button:hover {
        background: #ede9fe;
        border-color: #c4b5fd;
      }

      .filter-actions button:focus-visible {
        outline: 2px solid #8b5cf6;
        outline-offset: 1px;
      }

      .filter-tree {
        max-height: min(340px, 50vh);
        overflow-y: auto;
        overflow-x: hidden;
        font-size: 0.82rem;
        line-height: 1.35;
        scrollbar-color: #c4b5fd #f5f3ff;
        scrollbar-width: thin;
      }

      .filter-tree::-webkit-scrollbar {
        width: 8px;
      }

      .filter-tree::-webkit-scrollbar-thumb {
        background: #c4b5fd;
        border-radius: 4px;
      }

      .filter-continent-block {
        margin-bottom: 0.35rem;
      }

      .filter-continent-block:last-child {
        margin-bottom: 0;
      }

      .filter-continent-header {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.2rem 0;
      }

      .filter-expand {
        flex-shrink: 0;
        width: 1.65rem;
        height: 1.65rem;
        padding: 0;
        font-size: 0.65rem;
        line-height: 1;
        color: #6b7280;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        cursor: pointer;
        transition:
          background 0.12s ease,
          color 0.12s ease;
      }

      .filter-expand:hover {
        background: #ede9fe;
        color: #5b21b6;
        border-color: #ddd6fe;
      }

      .filter-expand:focus-visible {
        outline: 2px solid #8b5cf6;
        outline-offset: 1px;
      }

      .filter-continent-label {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex: 1;
        min-width: 0;
        font-weight: 600;
        color: #374151;
        cursor: pointer;
        user-select: none;
      }

      .filter-continent-label input {
        flex-shrink: 0;
        width: 1rem;
        height: 1rem;
        accent-color: #7c3aed;
        cursor: pointer;
      }

      .filter-continent-label .filter-continent-title {
        flex: 1;
        min-width: 0;
      }

      .filter-continent-name {
        font-weight: 700;
      }

      .filter-continent-meta {
        font-weight: 500;
        color: #9ca3af;
        font-size: 0.78rem;
      }

      .filter-country-list {
        padding: 0.15rem 0 0.35rem 2.15rem;
        border-left: 2px solid #ede9fe;
        margin-left: 0.75rem;
      }

      .filter-country-row {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.18rem 0;
      }

      .filter-country-row label {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex: 1;
        min-width: 0;
        cursor: pointer;
        color: #4b5563;
        font-weight: 400;
      }

      .filter-country-row input {
        flex-shrink: 0;
        width: 0.95rem;
        height: 0.95rem;
        accent-color: #7c3aed;
        cursor: pointer;
      }

      .filter-country-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .filter-country-code {
        flex-shrink: 0;
        font-size: 0.72rem;
        font-weight: 600;
        color: #9ca3af;
        font-variant-numeric: tabular-nums;
      }

      @media (max-width: 640px) {
        .report-button {
          position: static; /* убираем absolute */
          margin: 0 auto 12px; /* центрируем и даём отступ снизу */
          width: 110px;
          height: 40px;
          flex-direction: row; /* текст в строку */
          gap: 6px;
          font-size: 13px;
          border-radius: 8px;
        }
      }
    </style>
  </head>
  <body>
    <a href="report.html" class="report-button">
      <span>View</span>
      <span>Report</span>
    </a>
    <h1 class="page-title">CO₂ Emissions vs Population by Year</h1>

    <div class="chart-wrap">
      <div class="view-controls">
        <div class="view-controls-group" role="group" aria-label="View mode">
          <span class="view-controls-label">View by</span>
          <label class="view-toggle">
            <span class="toggle-countries active">Countries</span>
            <span class="switch">
              <input
                type="checkbox"
                id="viewToggle"
                aria-label="Show continent totals instead of countries"
              />
              <span class="switch-track">
                <span class="switch-thumb" aria-hidden="true"></span>
              </span>
            </span>
            <span class="toggle-continents">Continents</span>
          </label>
        </div>

        <span class="view-controls-divider" aria-hidden="true"></span>

        <div class="view-controls-group" role="group" aria-label="Axis scale">
          <span class="view-controls-label">Axis scale</span>
          <label class="view-toggle">
            <span class="toggle-scale-log active">Log</span>
            <span class="switch">
              <input
                type="checkbox"
                id="scaleToggle"
                aria-label="Use linear axis scale instead of logarithmic"
              />
              <span class="switch-track">
                <span class="switch-thumb" aria-hidden="true"></span>
              </span>
            </span>
            <span class="toggle-scale-linear">Linear</span>
          </label>
        </div>
      </div>

      <div class="svg-viewport">
        <svg
          id="chart"
          viewBox="0 0 1080 500"
          preserveAspectRatio="xMidYMid meet"
        ></svg>
      </div>

      <div class="slider-block">
        <input
          type="range"
          id="yearSlider"
          class="year-slider"
          aria-label="Select year"
        />
        <div class="year-label-row">Year: <span id="yearLabel"></span></div>
      </div>

      <div class="filter-panel-wrap">
        <button
          type="button"
          id="filterDropdownBtn"
          class="filter-dropdown-btn"
          aria-expanded="false"
          aria-controls="filterPanel"
        >
          <span>Filter countries &amp; regions</span>
          <span class="filter-chevron" aria-hidden="true">▼</span>
        </button>
        <div id="filterPanel" class="filter-panel" hidden>
          <div class="filter-actions">
            <button type="button" id="selectAllFilter">Select all</button>
            <button type="button" id="deselectAllFilter">Deselect all</button>
          </div>
          <div id="filterTree" class="filter-tree"></div>
        </div>
      </div>
    </div>

    <script src="continent-codes.js"></script>
    <script src="main.js"></script>
  </body>
</html>
